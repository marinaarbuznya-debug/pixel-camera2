name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.5'

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias camera \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore keystore.jks \
            -storepass camera123 \
            -keypass camera123 \
            -dname "CN=Camera, OU=App, O=App, L=City, S=State, C=US"

      - name: Build APK
        run: |
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
            -Pandroid.injected.signing.store.password=camera123 \
            -Pandroid.injected.signing.key.alias=camera \
            -Pandroid.injected.signing.key.password=camera123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: camera-apk
          path: app/build/outputs/apk/release/*.apk
